<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GaliLeo CV</title>
    <style>
      :root {
        color: #222;
        background: #f7f8fa;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(720px, calc(100% - 40px));
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(32px, 6vw, 56px);
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #4b5563;
        font-size: 18px;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>GaliLeo CV</h1>
      <p>AI 赋能的智能简历分析系统。前端页面将在后续开发后由 GitHub Pages 自动部署。</p>
    </main>
  </body>
</html>
