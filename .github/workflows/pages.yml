name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_PAGES_TOKEN: ${{ secrets.PAGES_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        if: hashFiles('frontend/package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        if: hashFiles('frontend/package.json') != ''
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Prepare Pages artifact
        run: |
          rm -rf .pages-dist
          if [ -d frontend/dist ]; then
            cp -R frontend/dist .pages-dist
          else
            mkdir .pages-dist
            find . \
              -maxdepth 1 \
              ! -name . \
              ! -name .git \
              ! -name .github \
              ! -name .pages-dist \
              -exec cp -R {} .pages-dist/ \;
          fi

      - name: Configure Pages with auto-enable token
        if: env.HAS_PAGES_TOKEN == 'true'
        uses: actions/configure-pages@v5
        with:
          token: ${{ secrets.PAGES_TOKEN }}
          enablement: true

      - name: Configure Pages
        if: env.HAS_PAGES_TOKEN != 'true'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
